<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@200;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <img src="aura-scouting-logo.png" loading="lazy" alt="Aura Scouting Logo" class="logo-img">
      </div>
      <div class="header-title">China Selection</div>
      <div class="header-contacts">
        <div class="contacts-title">DIRECTORS</div>
        <a href="mailto:emmanuel@aurascouting.com" class="mail-link">emmanuel@aurascouting.com</a>
        <a href="mailto:magali@aurascouting.com" class="mail-link">magali@aurascouting.com</a>
      </div>
    </div>
  </header>
  <main class="grid-container" id="modelGrid"></main>

  <!-- SECCIÓN POLAS EN PÁGINA COMPLETA -->
  <section id="polasSection" class="polas-section">
    <div class="polas-inner">
      <button class="close-polas" id="closePolasBtn" title="Cerrar">&times;</button>
      <div class="polas-header">
        <div id="polasName" class="polas-name"></div>
        <div class="polas-measures" id="polasMeasures"></div>
      </div>
      <div class="polas-gallery" id="polasGallery"></div>
      <div class="instagram-section">
        <div class="insta-title">Instagram</div>
        <div class="insta-gallery" id="instaGallery"></div>
      </div>
    </div>
  </section>

  <div id="imgViewer" class="img-viewer-modal">
    <span class="img-viewer-close" tabindex="0">&times;</span>
    <img class="img-viewer-img" src="" alt="Big Preview">
    <div class="img-viewer-nav img-viewer-prev" tabindex="0">&#10094;</div>
    <div class="img-viewer-nav img-viewer-next" tabindex="0">&#10095;</div>
  </div>

  <footer id="footer">
    <div class="footer-content">
      © 2025 Aura Scouting. All rights reserved.
    </div>
  </footer>
  <script src="models.js"></script>
  <script src="script.js"></script>
</body>

</html>
